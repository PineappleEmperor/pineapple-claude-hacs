name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
# Sole labeler: release-drafter autolabeler (via pr-labeler.yml), keyed on the PR TITLE
# only — create-dev-pr.yml sets the title to the winning commit type (feat > fix > last),
# so this is effectively commit-driven. No branch rules (they caused label flapping when
# the branch name disagreed with the commits). Breaking `!` rule must precede `feature`.
autolabeler:
  - label: "xfeat"
    title:
      - '/^\w+(\(.+\))?!:/'
  - label: "chore"
    title:
      - '/^(chore|docs|refactor|perf|test|build|ci|style)(\(.+\))?:/i'
  - label: "fix"
    title:
      - '/^fix(\(.+\))?:/i'
  - label: "feature"
    title:
      - '/^(feat|feature)(\(.+\))?:/i'
categories:
  - title: '🚨 Breaking Change'
    labels:
      - 'xfeat'
      - 'xfeature'
      - 'major'
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
      - 'enhancement'
  - title: '🔧 Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    label: 'chore'
change-template: |-
  - $TITLE @$AUTHOR (#$NUMBER)
  $BODY
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
# $BODY is global (release-drafter has no per-category change-template), so Dependabot's
# body would inline too. Bounded replacers scrub the bot fluff while keeping human PRs'
# grouped mini-changelog. Bounded = no end-anchor, so they can't bleed across PR bodies.
replacers:
  - search: '/<details>[\s\S]*?<\/details>\s*/g'
    replace: ''
  - search: '/\[!\[Dependabot compatibility score\][^\n]*\n?/g'
    replace: ''
  - search: '/Dependabot will resolve[^\n]*\n?/g'
    replace: ''
  - search: '/\/\/: # \(dependabot-start\)[\s\S]*?\/\/: # \(dependabot-end\)\s*/g'
    replace: ''
  - search: '/<br\s*\/?>\s*/g'
    replace: ''
version-resolver:
  major:
    labels:
      - 'major'
      - 'xfeature'
      - 'xfeat'
  minor:
    labels:
      - 'feat'
      - 'feature'
      - 'minor'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'chore'
      - 'bugfix'
      - 'bug'
  default: patch
template: |
  ## Changes

  $CHANGES
